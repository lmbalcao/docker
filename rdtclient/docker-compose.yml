services:
  rdtclient:
    image: rogerfar/rdtclient
    container_name: rdtclient
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Europe/Lisbon
    volumes:
      - /opt/rdtclient:/data/db
      - /mnt/data/rdtclient:/data/data
      - /mnt/downloads/rdtclient:/data/downloads
    logging:
       driver: json-file
       options:
          max-size: 10m
    ports:
      - 6500:6500
    restart: unless-stopped
