name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  secret-scan:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block risky tracked filenames
        run: |
          set -euo pipefail
          matches="$(git ls-files | grep -E '(^|/)(\.env($|\..*)|id_rsa(\.pub)?$|id_dsa(\.pub)?$|id_ecdsa(\.pub)?$|id_ed25519(\.pub)?$|.*\.(pem|key|p12|pfx|jks|kdbx|ovpn)$|.*\.tfvars$|.*\.npmrc$|.*\.pypirc$)' | grep -Ev '\.env\.(example|sample|template|dist)$|\.tfvars\.(example|sample)$' || true)"
          if [ -n "${matches}" ]; then
            echo "Tracked files with sensitive naming pattern:"
            echo "${matches}"
            exit 1
          fi

      - name: Detect high-risk token formats
        run: |
          set -euo pipefail
          pattern='(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|AIza[0-9A-Za-z_-]{35})'
          hits="$(git grep -nEI "${pattern}" -- . || true)"
          if [ -n "${hits}" ]; then
            echo "Potential hardcoded access tokens found:"
            echo "${hits}"
            exit 1
          fi

      - name: Detect hardcoded secret assignments
        run: |
          set -euo pipefail
          raw_hits="$(git grep -nEI '(PASSWORD|SECRET(_KEY)?|TOKEN|API_KEY)[[:space:]]*[:=][[:space:]]*\"[^\"$]{12,}\"' -- '*.yml' '*.yaml' '*.env' '*.ini' '*.conf' '*.toml' '*.json' || true)"
          hits="$(printf '%s\n' "${raw_hits}" | grep -Eiv 'change[-_ ]?me|please_change|example|sample|placeholder|troca|dummy|\\$\\{' || true)"
          if [ -n "${hits}" ]; then
            echo "Potential hardcoded secrets found:"
            echo "${hits}"
            exit 1
          fi
