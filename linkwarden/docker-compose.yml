version: "3.9"

services:
  init-host:
      image: alpine:3.21
          restart: "no"
              user: "0:0"
                  volumes:
                        - /opt:/opt
                            entrypoint:
                                  - /bin/sh
                                        - -lc
                                              - |
                                                      set -e
                                                              mkdir -p /opt/linkwarden/pgdata
                                                                      mkdir -p /opt/linkwarden/meili_data
                                                                              mkdir -p /opt/linkwarden/data
                                                                                      chown -R 1010:1010 /opt/linkwarden
                                                                                              chmod -R 750 /opt/linkwarden

                                                                                                postgres:
                                                                                                    image: postgres:16-alpine
                                                                                                        restart: always
                                                                                                            user: "1010:1010"
                                                                                                                depends_on:
                                                                                                                      init-host:
                                                                                                                              condition: service_completed_successfully
                                                                                                                                  environment:
                                                                                                                                        POSTGRES_USER: postgres
                                                                                                                                              POSTGRES_PASSWORD: MUDA_ESTA_SENHA_FORTE
                                                                                                                                                    POSTGRES_DB: postgres
                                                                                                                                                        volumes:
                                                                                                                                                              - /opt/linkwarden/pgdata:/var/lib/postgresql/data
                                                                                                                                                                  security_opt:
                                                                                                                                                                        - no-new-privileges:true

                                                                                                                                                                          meilisearch:
                                                                                                                                                                              image: getmeili/meilisearch:v1.12.8
                                                                                                                                                                                  restart: always
                                                                                                                                                                                      user: "1010:1010"
                                                                                                                                                                                          depends_on:
                                                                                                                                                                                                init-host:
                                                                                                                                                                                                        condition: service_completed_successfully
                                                                                                                                                                                                            environment:
                                                                                                                                                                                                                  MEILI_NO_ANALYTICS: "true"
                                                                                                                                                                                                                        MEILI_MASTER_KEY: MUDA_ESTA_MASTER_KEY
                                                                                                                                                                                                                            volumes:
                                                                                                                                                                                                                                  - /opt/linkwarden/meili_data:/meili_data
                                                                                                                                                                                                                                      security_opt:
                                                                                                                                                                                                                                            - no-new-privileges:true

                                                                                                                                                                                                                                              linkwarden:
                                                                                                                                                                                                                                                  image: ghcr.io/linkwarden/linkwarden:latest
                                                                                                                                                                                                                                                      restart: always
                                                                                                                                                                                                                                                          user: "1010:1010"
                                                                                                                                                                                                                                                              depends_on:
                                                                                                                                                                                                                                                                    init-host:
                                                                                                                                                                                                                                                                            condition: service_completed_successfully
                                                                                                                                                                                                                                                                                  postgres:
                                                                                                                                                                                                                                                                                          condition: service_started
                                                                                                                                                                                                                                                                                                meilisearch:
                                                                                                                                                                                                                                                                                                        condition: service_started
                                                                                                                                                                                                                                                                                                            ports:
                                                                                                                                                                                                                                                                                                                  - "3000:3000"
                                                                                                                                                                                                                                                                                                                      volumes:
                                                                                                                                                                                                                                                                                                                            - /opt/linkwarden/data:/data/data
                                                                                                                                                                                                                                                                                                                                environment:
                                                                                                                                                                                                                                                                                                                                      # URL pública
                                                                                                                                                                                                                                                                                                                                            NEXTAUTH_URL: https://link.lbtec.org/api/v1/auth
                                                                                                                                                                                                                                                                                                                                                  NEXTAUTH_SECRET: MUDA_ESTE_SECRET_LONGO_E_ALEATORIO

                                                                                                                                                                                                                                                                                                                                                        # Database
                                                                                                                                                                                                                                                                                                                                                              DATABASE_URL: postgresql://postgres:MUDA_ESTA_SENHA_FORTE@postgres:5432/postgres

                                                                                                                                                                                                                                                                                                                                                                    # MeiliSearch
                                                                                                                                                                                                                                                                                                                                                                          MEILI_HOST: http://meilisearch:7700
                                                                                                                                                                                                                                                                                                                                                                                MEILI_MASTER_KEY: MUDA_ESTA_MASTER_KEY

                                                                                                                                                                                                                                                                                                                                                                                      # ===== Authentik (OIDC) =====
                                                                                                                                                                                                                                                                                                                                                                                            NEXT_PUBLIC_AUTHENTIK_ENABLED: "true"
                                                                                                                                                                                                                                                                                                                                                                                                  AUTHENTIK_CUSTOM_NAME: Authentik
                                                                                                                                                                                                                                                                                                                                                                                                        AUTHENTIK_ISSUER: https://authentik.lbtec.org/application/o/linkwarden
                                                                                                                                                                                                                                                                                                                                                                                                              AUTHENTIK_CLIENT_ID: MUDA_CLIENT_ID_AUTHENTIK
                                                                                                                                                                                                                                                                                                                                                                                                                    AUTHENTIK_CLIENT_SECRET: MUDA_CLIENT_SECRET_AUTHENTIK

                                                                                                                                                                                                                                                                                                                                                                                                                          # Básico
                                                                                                                                                                                                                                                                                                                                                                                                                                STORAGE_FOLDER: /data/data
                                                                                                                                                                                                                                                                                                                                                                                                                                      NEXT_PUBLIC_DISABLE_REGISTRATION: "false"
                                                                                                                                                                                                                                                                                                                                                                                                                                            NEXT_PUBLIC_CREDENTIALS_ENABLED: "true"

                                                                                                                                                                                                                                                                                                                                                                                                                                                security_opt:
                                                                                                                                                                                                                                                                                                                                                                                                                                                      - no-new-privileges:true
                                                                                                                                                                                                                                                                                                                                                                                                                                                          cap_drop:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                - ALL