apiVersion: v1
kind: Service
metadata:
  name: immich-server
spec:
  selector: { app: immich-server }
  ports:
    - name: http
      port: 3001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
spec:
  replicas: 1
  selector: { matchLabels: { app: immich-server } }
  template:
    metadata: { labels: { app: immich-server } }
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: DB_HOSTNAME
              value: postgres.immich.svc.cluster.local
            - name: DB_USERNAME
              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: db-password
            - name: REDIS_HOSTNAME
              value: redis.immich.svc.cluster.local
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning.immich.svc.cluster.local:3003
            - name: TZ
              value: Europe/Lisbon
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: immich-rwx
              mountPath: /usr/src/app/upload
              subPath: upload
            - name: immich-rwx
              mountPath: /usr/src/app/library
              subPath: library
      volumes:
        - name: immich-rwx
          persistentVolumeClaim:
            claimName: immich-rwx
