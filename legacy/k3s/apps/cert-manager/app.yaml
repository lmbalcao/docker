apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:lmbalcao/k3s.git   # ajusta para o teu repositório
    targetRevision: main                       # ajusta para o branch que usas
    path: apps/cert-manager
    helm:
      releaseName: cert-manager-wrapper
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
