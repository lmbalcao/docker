apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  labels:
    app.kubernetes.io/name: tdarr
    app.kubernetes.io/part-of: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tdarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tdarr
    spec:
      securityContext:
        runAsUser: 1007
        runAsGroup: 1027
        fsGroup: 1027
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-nfs-tdarr
          image: busybox:1.36
          command: ["sh", "-c", "set -eux; mkdir -p /init-media/tdarr /init-downloads/tdarr"]
          securityContext:
            runAsUser: 1007
            runAsGroup: 1027
          volumeMounts:
            - name: media-rwx
              mountPath: /init-media
            - name: downloads-rwx
              mountPath: /init-downloads
      containers:
        - name: tdarr
          image: ghcr.io/linuxserver/tdarr:2.00.20   # ou "latest"/"development"
          imagePullPolicy: IfNotPresent

          env:
            - name: PUID
              value: "1007"
            - name: PGID
              value: "1027"
            - name: TZ
              value: "Europe/Lisbon"
          ports:
            - containerPort: 8265
              name: http
          volumeMounts:
            - name: media-rwx
              mountPath: /media
              subPath: tdarr
            - name: downloads-rwx
              mountPath: /downloads
              subPath: tdarr
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: media-rwx
          persistentVolumeClaim:
            claimName: media-rwx
        - name: downloads-rwx
          persistentVolumeClaim:
            claimName: downloads-rwx
        - name: config
          emptyDir: {}
