services:
  claude-bot:
    container_name: claude-bot
    build:
      context: https://lmbalcao:${FORGEJO_TOKEN}@forgejo.lbtec.org/lmbalcao/claude-bot.git#main
    restart: unless-stopped

    volumes:
      - /opt/claude-bot:/app/data
      # Claude CLI binary e autenticação montados do host
      - ${CLAUDE_BIN_HOST:-/usr/local/bin/claude}:/usr/local/bin/claude:ro
      - ${CLAUDE_CONFIG_HOST:-/root/.claude}:/root/.claude:ro

    environment:
      TZ: "Europe/Lisbon"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      NOTIFY_PORT: "3000"
      CLAUDE_BIN: "/usr/local/bin/claude"
      DATA_FILE: "/app/data/data.json"
      # NOTIFY_SECRET: "${NOTIFY_SECRET}"

    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"

    ports:
      - "3000:3000"
