apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  labels:
    app.kubernetes.io/name: homarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homarr
    spec:
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7575
              name: http
          # Sem persistência: dados perdem-se em recriações
          volumeMounts:
            - name: homarr-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: homarr-data
          emptyDir: {}   # <- sem PVC, não persistente
