apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  labels:
    app.kubernetes.io/name: syncthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syncthing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncthing
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-nfs-syncthing
          image: busybox:1.36
          command: ["sh", "-c", "set -eux; mkdir -p /mnt/sync/config /mnt/sync/data"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: syncthing-rwx
              mountPath: /mnt/sync
      containers:
        - name: syncthing
          image: lscr.io/linuxserver/syncthing:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"   # <--- ajusta se o /syncthing tiver outro owner
            - name: PGID
              value: "1000"   # <--- ajusta se o /syncthing tiver outro group
            - name: TZ
              value: "Europe/Lisbon"
          ports:
            - containerPort: 8384
              name: gui
            - containerPort: 22000
              name: sync-tcp
              protocol: TCP
            - containerPort: 22000
              name: sync-udp
              protocol: UDP
          volumeMounts:
            - name: syncthing-rwx
              mountPath: /config
              subPath: config
            - name: syncthing-rwx
              mountPath: /data
              subPath: data
          readinessProbe:
            httpGet:
              path: /
              port: gui
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: gui
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: syncthing-rwx
          persistentVolumeClaim:
            claimName: syncthing-rwx
