version: "3.8"

services:
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      PUID: 1001
      PGID: 1001
      LOG_LEVEL: debug
      TZ: Europe/Lisbon
      PORT: 5055
    ports:
      - "5055:5055"
    volumes:
      - /opt/jellyseerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
