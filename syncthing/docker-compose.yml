  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing
    environment:
      PUID: 1006
      PGID: 1006
      TZ: Europe/Lisbon
    volumes:
      - /opt/syncthing/config:/config
      - /mnt/data:/data              
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    restart: unless-stopped
