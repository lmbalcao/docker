- defaultTab: nodes
  description: |-
    Diagnóstico e recuperação de host em caso de falha icmp
    Tive que adicionar as chaves ssh dentro do compose do rundeck, ao user rundeck

    TEM QUE SE CRIAR O WEBHOOK E ADICIONAR/CONFIGURAR WEBHOOK CONSOANTE O TIPO DE ERRO
  executionEnabled: true
  id: 3f43aa11-711d-41e8-bd38-c80353003881
  loglevel: INFO
  maxMultipleExecutions: '2'
  multipleExecutions: true
  name: '[Alertmanager] Recupera host ou notifica de host em baixo'
  nodeFilterEditable: false
  options:
  - description: IP do host alvo (vem do alerta Prometheus via Alertmanager)
    label: Target Host IP
    name: hostname
    regex: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
    required: true
  - description: Mountpoint a verificar (opcional). Se vazio usa "/".
    label: Mountpoint
    name: mount
    value: /
  plugins:
    ExecutionLifecycle: {}
  scheduleEnabled: false
  sequence:
    commands:
    - autoSecureInput: 'false'
      description: 'Tenta recuperação automática do host, tendo em conda a sua natureza'
      passSecureInput: 'false'
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        IP="${RD_OPTION_HOSTNAME:?option hostname não fornecida}"
        CFG_DIR="/home/rundeck/configs"
        PROXMOX_CONF="/home/rundeck/configs/proxmox.conf"

        SSH_PORT="${RD_OPTION_SSH_PORT:-22}"
        SSH_USER_DEFAULT="${RD_OPTION_SSH_USER:-root}"
        SSH_OPTS="-p ${SSH_PORT} -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new"

        # tempos (ajustáveis via options do Rundeck se quiseres)
        WAIT_RUNNING_SECS="${RD_OPTION_WAIT_RUNNING_SECS:-120}"  # esperar por pct status=running
        WAIT_PING_SECS="${RD_OPTION_WAIT_PING_SECS:-60}"         # esperar por ICMP do contentor
        PING_INTERVAL_SECS="${RD_OPTION_PING_INTERVAL_SECS:-2}"

        # --- localizar ficheiro + bloco ---
        mapfile -t HIT < <(
          for f in "$CFG_DIR"/*.conf; do
            [ -f "$f" ] || continue
            awk -v ip="$IP" '
              function trim(s){ gsub(/^[[:space:]]+|[[:space:]]+$/, "", s); return s }
              function dequote(s){ s=trim(s); gsub(/^["'\'' ]+|["'\'' ]+$/, "", s); return s }

              /^[^[:space:]][^:]*:[[:space:]]*$/ { sec=$1; sub(/:$/, "", sec); next }

              /^[[:space:]]*hostname:[[:space:]]*/ {
                v=$0
                sub(/^[[:space:]]*hostname:[[:space:]]*/, "", v)
                if (dequote(v) == ip) {
                  print FILENAME "\t" sec
                  exit
                }
              }
            ' "$f" 2>/dev/null || true
          done
        )

        [ "${#HIT[@]}" -eq 1 ] || {
          echo "ERRO: IP '$IP' ambíguo ou inexistente nos .conf em $CFG_DIR"
          [ "${#HIT[@]}" -gt 1 ] && printf '%s\n' "${HIT[@]}"
          exit 1
        }

        FILE="${HIT[0]%$'\t'*}"
        NODEKEY="${HIT[0]#*$'\t'}"

        # --- extrair tags + vmid + proxmoxNode + username ---
        # Mantém as linhas de output "human" (Docker/Lxc/etc) e acrescenta ACTION/PROXMOX_NODE/SSH_USER para lógica.
        OUT="$(
          awk -v key="$NODEKEY" '
            function trim(s){ gsub(/^[[:space:]]+|[[:space:]]+$/, "", s); return s }
            function dequote(s){ s=trim(s); gsub(/^["'\'' ]+|["'\'' ]+$/, "", s); return s }
            function has(t){ return (t in T) }

            BEGIN { in_sec=0; vmid=""; pnode=""; user=""; action="NAO_LXC" }

            $0 ~ ("^" key ":[[:space:]]*$") { in_sec=1; next }
            in_sec && /^[^[:space:]][^:]*:/ { exit }

            in_sec && /^[[:space:]]*vmid:[[:space:]]*/ {
              v=$0; sub(/^[[:space:]]*vmid:[[:space:]]*/, "", v); vmid=dequote(v); next
            }

            in_sec && /^[[:space:]]*proxmoxNode:[[:space:]]*/ {
              v=$0; sub(/^[[:space:]]*proxmoxNode:[[:space:]]*/, "", v); pnode=dequote(v); next
            }

            in_sec && /^[[:space:]]*username:[[:space:]]*/ {
              v=$0; sub(/^[[:space:]]*username:[[:space:]]*/, "", v); user=dequote(v); next
            }

            in_sec && /^[[:space:]]*tags:[[:space:]]*/ {
              v=$0
              sub(/^[[:space:]]*tags:[[:space:]]*/, "", v)
              v=tolower(dequote(v))
              n=split(v,a,",")
              for(i=1;i<=n;i++) {
                a[i]=trim(a[i])
                if (a[i] != "") T[a[i]]=1
              }
              next
            }

            END {
              if (has("lxc"))      { print "Lxc";     action="LXC_RECOVER" }
              else if (has("proxmox")) { print "Proxmox"; action="PROXMOX_RECOVER" }
              else if (has("openwrt")) { print "Openwrt"; action="OPENWRT_RECOVER" }
              else if (has("linux"))   { print "Linux";   action="LINUX_RECOVER" }
              else { print "Placeholder" }


              # linhas de controlo (para o bash)
              print "ACTION=" action
              print "PROXMOX_NODE=" pnode
              print "USERNAME=" user
              print "vmid=" vmid
            }
          ' "$FILE"
        )"

        # LXC
        printf '%s\n' "$OUT"

        ACTION="$(printf '%s\n' "$OUT" | awk -F= '$1=="ACTION"{print $2; exit}')"
        VMID="$(printf '%s\n' "$OUT" | awk -F= '$1=="vmid"{print $2; exit}')"
        PROXMOX_NODE="$(printf '%s\n' "$OUT" | awk -F= '$1=="PROXMOX_NODE"{print $2; exit}')"
        USERNAME="$(printf '%s\n' "$OUT" | awk -F= '$1=="USERNAME"{print $2; exit}')"

        # se não for lxc: termina como pediste
        if [ "${ACTION:-}" != "LXC_RECOVER" ]; then
          echo "não é lxc"
          exit 0
        fi

        # validações mínimas
        if [ -z "${VMID:-}" ] || [ "$VMID" = "(sem vmid)" ]; then
          echo "ERRO: é lxc mas vmid em falta no bloco '$NODEKEY' em $FILE"
          exit 2
        fi
        if [ -z "${PROXMOX_NODE:-}" ] || [ "$PROXMOX_NODE" = "(sem proxmoxNode)" ]; then
          echo "ERRO: é lxc mas proxmoxNode em falta no bloco '$NODEKEY' em $FILE"
          exit 2
        fi

        # usar username do bloco se existir, senão default
        SSH_USER="$SSH_USER_DEFAULT"
        if [ "$USERNAME" != "(sem username)" ] && [ -n "$USERNAME" ]; then
          SSH_USER="$USERNAME"
        fi

        # descobrir hostname/IP do proxmox no proxmox.conf (secção: <proxmoxNode>: hostname:)
        PM_HOST="$(
          awk -v key="$PROXMOX_NODE" '
            function trim(s){ gsub(/^[[:space:]]+|[[:space:]]+$/, "", s); return s }
            function dequote(s){ s=trim(s); gsub(/^["'\'' ]+|["'\'' ]+$/, "", s); return s }
            BEGIN{ in_sec=0 }
            $0 ~ ("^" key ":[[:space:]]*$") { in_sec=1; next }
            in_sec && /^[^[:space:]][^:]*:/ { in_sec=0 }
            in_sec && /^[[:space:]]*hostname:[[:space:]]*/ {
              v=$0; sub(/^[[:space:]]*hostname:[[:space:]]*/, "", v)
              print dequote(v)
              exit
            }
          ' "$PROXMOX_CONF" 2>/dev/null || true
        )"

        if [ -z "${PM_HOST:-}" ]; then
          echo "ERRO: não encontrei '$PROXMOX_NODE' -> hostname: no $PROXMOX_CONF"
          exit 3
        fi

        # --- sequencia de recuperação ---
        # 1) ver estado
        status="$(ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct status ${VMID} 2>/dev/null | awk '{print \$2}'" || true)"

        if [ "${status:-}" = "running" ]; then
          echo "lxc up nao faz nada"
          exit 0
        fi

        # 2) start
        ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct start ${VMID} >/dev/null 2>&1 || true"

        # 3) esperar por running
        deadline=$((SECONDS + WAIT_RUNNING_SECS))
        while [ $SECONDS -lt $deadline ]; do
          status="$(ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct status ${VMID} 2>/dev/null | awk '{print \$2}'" || true)"
          [ "${status:-}" = "running" ] && break
          sleep 3
        done

        # Se NÃO ficou running, é down real -> notificar
        if [ "${status:-}" != "running" ]; then
          echo "lxc down envia notificacao"
          echo "DETALHE: proxmoxNode=$PROXMOX_NODE proxmoxHost=$PM_HOST vmid=$VMID alvo=$IP status=${status:-unknown}"
          exit 0
        fi

        # 4) (opcional) testar ICMP
        # Como definiste que "running = ok", ping falhar não deve disparar notificação.
        deadline=$((SECONDS + WAIT_PING_SECS))
        while [ $SECONDS -lt $deadline ]; do
          if ping -c 1 -W 1 "$IP" >/dev/null 2>&1; then
            break
          fi
          sleep "$PING_INTERVAL_SECS"
        done

        echo "lxc up nao faz nada"
        exit 0

        # PROXMOX
        # --- após teres OUT gerado pelo awk ---
        printf '%s\n' "$OUT"

        ACTION="$(printf '%s\n' "$OUT" | awk -F= '$1=="ACTION"{print $2; exit}')"
        VMID="$(printf '%s\n' "$OUT" | awk -F= '$1=="vmid"{print $2; exit}')"
        PROXMOX_NODE="$(printf '%s\n' "$OUT" | awk -F= '$1=="PROXMOX_NODE"{print $2; exit}')"
        USERNAME="$(printf '%s\n' "$OUT" | awk -F= '$1=="USERNAME"{print $2; exit}')"

        # user ssh (do bloco ou default)
        SSH_USER="$SSH_USER_DEFAULT"
        if [ -n "${USERNAME:-}" ] && [ "$USERNAME" != "(sem username)" ]; then
          SSH_USER="$USERNAME"
        fi

        case "${ACTION:-}" in
          LXC_RECOVER)
            # validações mínimas
            if [ -z "${VMID:-}" ] || [ "$VMID" = "(sem vmid)" ]; then
              echo "ERRO: é lxc mas vmid em falta no bloco '$NODEKEY' em $FILE"
              exit 2
            fi
            if [ -z "${PROXMOX_NODE:-}" ] || [ "$PROXMOX_NODE" = "(sem proxmoxNode)" ]; then
              echo "ERRO: é lxc mas proxmoxNode em falta no bloco '$NODEKEY' em $FILE"
              exit 2
            fi

            # resolver host proxmox pelo proxmoxNode no proxmox.conf
            PM_HOST="$(
              awk -v key="$PROXMOX_NODE" '
                function trim(s){ gsub(/^[[:space:]]+|[[:space:]]+$/, "", s); return s }
                function dequote(s){ s=trim(s); gsub(/^["'\'' ]+|["'\'' ]+$/, "", s); return s }
                BEGIN{ in_sec=0 }
                $0 ~ ("^" key ":[[:space:]]*$") { in_sec=1; next }
                in_sec && /^[^[:space:]][^:]*:/ { in_sec=0 }
                in_sec && /^[[:space:]]*hostname:[[:space:]]*/ {
                  v=$0; sub(/^[[:space:]]*hostname:[[:space:]]*/, "", v)
                  print dequote(v); exit
                }
              ' "$PROXMOX_CONF" 2>/dev/null || true
            )"
            if [ -z "${PM_HOST:-}" ]; then
              echo "ERRO: não encontrei '$PROXMOX_NODE' -> hostname: no $PROXMOX_CONF"
              exit 3
            fi

            # 1) status
            status="$(ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct status ${VMID} 2>/dev/null | awk '{print \$2}'" || true)"
            if [ "${status:-}" = "running" ]; then
              echo "lxc up nao faz nada"
              exit 0
            fi

            # 2) start
            ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct start ${VMID} >/dev/null 2>&1 || true"

            # 3) esperar por running
            deadline=$((SECONDS + WAIT_RUNNING_SECS))
            while [ $SECONDS -lt $deadline ]; do
              status="$(ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "pct status ${VMID} 2>/dev/null | awk '{print \$2}'" || true)"
              [ "${status:-}" = "running" ] && break
              sleep 3
            done

            if [ "${status:-}" != "running" ]; then
              echo "lxc down envia notificacao"
              echo "DETALHE: proxmoxNode=$PROXMOX_NODE proxmoxHost=$PM_HOST vmid=$VMID alvo=$IP status=${status:-unknown}"
              exit 0
            fi

            # 4) ping opcional (não notifica)
            deadline=$((SECONDS + WAIT_PING_SECS))
            while [ $SECONDS -lt $deadline ]; do
              ping -c 1 -W 1 "$IP" >/dev/null 2>&1 && break
              sleep "$PING_INTERVAL_SECS"
            done

            echo "lxc up nao faz nada"
            exit 0
            ;;

          PROXMOX_RECOVER)
            PM_HOST="$IP"

            # validar SSH
            if ! ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" "true" >/dev/null 2>&1; then
              echo "proxmox down envia notificacao"
              echo "DETALHE: host=$PM_HOST user=$SSH_USER alvo=$IP ssh=fail"
              exit 0
            fi

            # validar serviços (sem restart)
            bad="$(
              ssh ${SSH_OPTS} "${SSH_USER}@${PM_HOST}" '
                for s in pve-cluster pvedaemon pveproxy; do
                  systemctl is-active --quiet "$s" || echo "$s"
                done
              ' 2>/dev/null || true
            )"

            if [ -n "$bad" ]; then
              echo "proxmox com serviços em baixo envia notificacao"
              echo "DETALHE: host=$PM_HOST user=$SSH_USER down=$(printf "%s" "$bad" | tr "\n" "," | sed "s/,$//")"
              exit 0
            fi

            echo "proxmox up nao faz nada"
            exit 0
            ;;

          OPENWRT_RECOVER)
            # sem alterações: apenas valida ICMP/SSH (dropbear) e notifica se falhar
            if ping -c 1 -W 1 "$IP" >/dev/null 2>&1; then
              if ssh ${SSH_OPTS} "${SSH_USER}@${IP}" "true" >/dev/null 2>&1; then
                echo "openwrt up nao faz nada"
                exit 0
              fi
              echo "openwrt ssh down envia notificacao"
              echo "DETALHE: host=$IP user=$SSH_USER ssh=fail"
              exit 0
            fi
            echo "openwrt icmp down envia notificacao"
            echo "DETALHE: host=$IP icmp=fail"
            exit 0
            ;;

          LINUX_RECOVER)
            # sem alterações: valida SSH e notifica se falhar
            if ssh ${SSH_OPTS} "${SSH_USER}@${IP}" "true" >/dev/null 2>&1; then
              echo "linux up nao faz nada"
              exit 0
            fi
            echo "linux ssh down envia notificacao"
            echo "DETALHE: host=$IP user=$SSH_USER ssh=fail"
            exit 0
            ;;

          *)
            echo "não há ação"
            exit 0
            ;;
        esac
    keepgoing: false
    strategy: node-first
  uuid: 3f43aa11-711d-41e8-bd38-c80353003881

