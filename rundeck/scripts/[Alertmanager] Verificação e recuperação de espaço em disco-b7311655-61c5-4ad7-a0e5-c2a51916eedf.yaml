        sub "df (inodes)"
        DFI_LINE="$(df -iP "$MOUNT" 2>/dev/null | awk 'NR==2{print $0}' || true)"
        if [ -z "${DFI_LINE:-}" ]; then
          DFI_LINE="$(df -iP 2>/dev/null | awk 'NR==2{print $0}' || true)"
        fi
        echo "$DFI_LINE" | awk '{printf "Inodes=%s IUsed=%s IFree=%s IUseP=%s\n",$2,$3,$4,$5}' 2>/dev/null || true
        df -iP "$MOUNT" 2>/dev/null || df -iP 2>/dev/null || true

        # =========================
        # helper: top dirs/files (rápido, limitado)
        # =========================
        dir_size_k() {
          p="$1"
          [ -d "$p" ] || { echo 0; return 0; }
          if du -sk "$p" >/dev/null 2>&1; then
            du -sk "$p" 2>/dev/null | awk '{print $1}' || echo 0
          else
            echo 0
          fi
        }

        top_dirs() {
          p="$1"
          [ -d "$p" ] || return 0
          sub "top dirs: $p"
          if du -xhd1 "$p" >/dev/null 2>&1; then
            du -xhd1 "$p" 2>/dev/null | sort -h | tail -n 15 || true
          else
            du -hd1 "$p" 2>/dev/null | sort -h | tail -n 15 || true
          fi
        }

        top_files_varlog() {
          [ -d /var/log ] || return 0
          sub "top /var/log (files)"
          if find /var/log -type f -printf '' >/dev/null 2>&1; then
            find /var/log -type f -printf '%s\t%p\n' 2>/dev/null \
              | sort -nr | head -n 10 \
              | awk '{printf "%.1fMiB\t%s\n", $1/1024/1024, $2}'
          else
            du -a /var/log 2>/dev/null | sort -nr | head -n 10 || true
          fi
        }

        journald_usage() {
          if has journalctl; then
            sub "journald disk-usage"
            journalctl --disk-usage 2>/dev/null || true
          fi
        }

        # =========================
        # VARS FILE (no remoto)
        # =========================
        VARS_FILE="/tmp/space_end.vars"
        : > "$VARS_FILE"
        kv() { echo "$1=$2" >> "$VARS_FILE"; }

        kv ts "$(ts)"
        kv host "$(hostname 2>/dev/null || echo unknown)"
        kv ip "$ip"
        kv type "$TYPE"
        kv mount "$MOUNT"
        kv docker "$DOCKER"
        kv portainer "$PORTAINER"

        # === FS (space) ===
        if [ -n "${DF_LINE:-}" ]; then
          FS_K="$(echo "$DF_LINE" | awk '{print $2}')"
          USED_K="$(echo "$DF_LINE" | awk '{print $3}')"
          AVAIL_K="$(echo "$DF_LINE" | awk '{print $4}')"
          USEP="$(echo "$DF_LINE" | awk '{gsub("%","",$5); print $5}')"
          kv fs_size_k "$FS_K"
          kv fs_used_k "$USED_K"
          kv fs_avail_k "$AVAIL_K"
          kv fs_use_pct "$USEP"
        fi

        # === INODES ===
        if [ -n "${DFI_LINE:-}" ]; then
          INODES="$(echo "$DFI_LINE" | awk '{print $2}')"
          IUSED="$(echo "$DFI_LINE" | awk '{print $3}')"
          IFREE="$(echo "$DFI_LINE" | awk '{print $4}')"
          IUSEP="$(echo "$DFI_LINE" | awk '{gsub("%","",$5); print $5}')"
          kv inodes_total "$INODES"
          kv inodes_used "$IUSED"
          kv inodes_free "$IFREE"
          kv inodes_use_pct "$IUSEP"
        fi

        # === DIR SIZES ===
        kv size_var_k "$(dir_size_k /var)"
        kv size_var_log_k "$(dir_size_k /var/log)"
        kv size_opt_k "$(dir_size_k /opt)"
        kv size_srv_k "$(dir_size_k /srv)"
        kv size_data_k "$(dir_size_k /data)"
        kv size_home_k "$(dir_size_k /home)"
        kv size_var_lib_docker_k "$(dir_size_k /var/lib/docker)"
        kv size_journal_k "$(dir_size_k /var/log/journal)"


        # (resto do teu script remoto fica igual daqui para baixo...)
        # ...
        REMOTE
    - autoSecureInput: 'false'
      description: Comparação
      passSecureInput: 'false'
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        STATE_FILE="/tmp/base.tmp"

        # =========================
        # No servidor Rundeck: lê opções do Job
        # =========================
        HOST="${RD_OPTION_HOSTNAME:?ERRO: RD_OPTION_HOSTNAME não definido}"
        SSH_USER="${RD_OPTION_SSH_USER:-root}"
        SSH_PORT="${RD_OPTION_SSH_PORT:-22}"
        SSH_OPTS="-p ${SSH_PORT} -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new"
        MOUNT="${RD_OPTION_MOUNT:-/}"

        # =========================
        # Liga por SSH ao host remoto e compara /tmp/space_init.vars vs /tmp/space_end.vars
        # (carrega /tmp/base.tmp NO REMOTO)
        # =========================
        ssh ${SSH_OPTS} "${SSH_USER}@${HOST}" sh -s -- "${STATE_FILE}" "${MOUNT}" <<'REMOTE'
        set -eu

        STATE_FILE="$1"
        MOUNT="$2"

        # =========================
        # NO REMOTO: valida e carrega STATE (/tmp/base.tmp)
        # =========================
        if [ ! -f "$STATE_FILE" ]; then
          echo "ERRO: (remoto) ficheiro $STATE_FILE não existe"
          exit 1
        fi

        # shellcheck disable=SC1090
        . "$STATE_FILE"

        : "${ip:?ERRO: (remoto) ip não definido em $STATE_FILE}"
        : "${type:?ERRO: (remoto) type não definido em $STATE_FILE}"
        : "${docker:?ERRO: (remoto) docker não definido em $STATE_FILE}"
        : "${portainer:?ERRO: (remoto) portainer não definido em $STATE_FILE}"

        case "$docker" in true|false) ;; *) echo "ERRO: (remoto) docker inválido: $docker"; exit 1;; esac
        case "$portainer" in true|false) ;; *) echo "ERRO: (remoto) portainer inválido: $portainer"; exit 1;; esac

        TYPE="$type"
        DOCKER="$docker"
        PORTAINER="$portainer"

        INIT="/tmp/space_start.vars"
        END="/tmp/space_end.vars"

        ts(){ date -Is 2>/dev/null || date; }

        echo "[REMOTE] host=$(hostname 2>/dev/null || echo unknown) user=$(whoami 2>/dev/null || echo unknown)"
        echo "[STATE] ip=$ip type=$TYPE docker=$DOCKER portainer=$PORTAINER mount=$MOUNT"
        echo "=== [COMPARE] $(ts) ==="

        if [ ! -f "$INIT" ]; then
          echo "ERRO: ficheiro init não existe: $INIT"
          exit 1
        fi
        if [ ! -f "$END" ]; then
          echo "ERRO: ficheiro end não existe: $END"
          exit 1
        fi

        # lê KV sem eval
        getv() {
          f="$1"; k="$2"
          awk -F= -v kk="$k" '$1==kk {sub(/^[^=]*=/,""); print; exit}' "$f" 2>/dev/null || true
        }

        fmt_kb() {
          v="$1"
          sign=""
          if [ "$v" -lt 0 ] 2>/dev/null; then
            sign="-"
            v=$(( -v ))
          fi
          if [ "$v" -ge 1048576 ] 2>/dev/null; then
            echo "${sign}$(( v / 1048576 ))GiB"
          elif [ "$v" -ge 1024 ] 2>/dev/null; then
            echo "${sign}$(( v / 1024 ))MiB"
          else
            echo "${sign}${v}KiB"
          fi
        }

        KEYS_KB="
        fs_size_k
        fs_used_k
        fs_avail_k
        size_var_k
        size_var_log_k
        size_opt_k
        size_srv_k
        size_data_k
        size_home_k
        size_var_lib_docker_k
        size_journal_k
        "

        KEYS_N="
        fs_use_pct
        inodes_total
        inodes_used
        inodes_free
        inodes_use_pct
        "

        echo
        echo "=== [DELTA] (END - INIT) ==="
        printf "%-22s %-14s %-14s %-14s\n" "KEY" "INIT" "END" "DELTA"
        echo "----------------------------------------------------------------"

        for k in $KEYS_KB; do
          a="$(getv "$INIT" "$k")"; b="$(getv "$END" "$k")"
          [ -n "${a:-}" ] || a=0
          [ -n "${b:-}" ] || b=0
          case "$a" in *[!0-9]* ) a=0 ;; esac
          case "$b" in *[!0-9]* ) b=0 ;; esac
          d=$(( b - a ))
          printf "%-22s %-14s %-14s %-14s\n" "$k" "$(fmt_kb "$a")" "$(fmt_kb "$b")" "$(fmt_kb "$d")"
        done

        for k in $KEYS_N; do
          a="$(getv "$INIT" "$k")"; b="$(getv "$END" "$k")"
          [ -n "${a:-}" ] || a=0
          [ -n "${b:-}" ] || b=0
          case "$a" in *[!0-9]* ) a=0 ;; esac
          case "$b" in *[!0-9]* ) b=0 ;; esac
          d=$(( b - a ))
          printf "%-22s %-14s %-14s %-14s\n" "$k" "$a" "$b" "$d"
        done

        echo
        echo "=== [CHANGES] linhas diferentes (raw) ==="
        grep -vE '^(ts|host)=' "$INIT" 2>/dev/null | sort > /tmp/.space_init.sorted || true
        grep -vE '^(ts|host)=' "$END"  2>/dev/null | sort > /tmp/.space_end.sorted  || true
        diff -u /tmp/.space_init.sorted /tmp/.space_end.sorted || true

        echo
        echo "=== [FIM] $(ts) ==="
        exit 0
        REMOTE
    keepgoing: false
    strategy: node-first
