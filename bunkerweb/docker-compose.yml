version: "3.8"

services:
  bunkerweb:
    image: bunkerity/bunkerweb-all-in-one:1.6.5
    container_name: bunkerweb-aio
    restart: unless-stopped
    environment:
      TZ: Europe/Lisbon
    ports:
      - "80:8080/tcp"
      - "443:8443/tcp"
      - "443:8443/udp"
    volumes:
      - bw-storage:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  bw-storage:
