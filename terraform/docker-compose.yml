networks:
  terraform-net:
    name: terraform-net

services:
  terraform:
    build:
      context: /opt/terraform
      dockerfile: Dockerfile
    container_name: terraform
    working_dir: /workspace

    environment:
      TF_INPUT: "0"
      TF_IN_AUTOMATION: "1"
      TF_PLUGIN_CACHE_DIR: /terraform/plugin-cache
      TF_DATA_DIR: /terraform/data
      TF_CLI_CONFIG_FILE: /terraform/config/.terraformrc
    volumes:
      - /opt/terraform/workspace:/workspace
      - /opt/terraform/data:/terraform/data
      - /opt/terraform/plugin-cache:/terraform/plugin-cache
      - /opt/terraform/config:/terraform/config
      - /mnt/data:/opt/data
    stdin_open: true
    tty: true
    entrypoint: ["sh", "-c"]
    command: ["sleep infinity"]
    restart: unless-stopped
    networks:
      - terraform-net

  terraform-api:
    build:
      context: /opt/terraform
      dockerfile: Dockerfile.api
    container_name: terraform-api
    working_dir: /workspace

    environment:
      TERRAFORM_CONTAINER: terraform
      PYTHONPATH: /workspace/tools
    volumes:
      - /opt/terraform/workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "-m", "terraform_gui_api.server", "--host", "0.0.0.0"]
    ports:
      - "8765:8765"
    depends_on:
      - terraform
    restart: unless-stopped
    networks:
      - terraform-net
