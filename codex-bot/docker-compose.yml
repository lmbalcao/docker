services:
  codex-bot:
    container_name: codex-bot
    build:
      context: https://lmbalcao:${FORGEJO_TOKEN}@forgejo.lbtec.org/lmbalcao/telegram-ai-bot.git#main
    restart: unless-stopped

    volumes:
      - /opt/ai-code/codex-bot:/app/data
      - /opt/ai-code/node_modules:/opt/node_modules:ro
      - /opt/ai-code/codex:/root/.codex:ro

    environment:
      TZ: "${TZ:-Europe/Lisbon}"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN_CODEX}"
      NOTIFY_PORT: "3000"
      AI_BIN: "/opt/node_modules/bin/codex"
      AI_TYPE: "codex"
      DATA_FILE: "/app/data/data.json"
      # NOTIFY_SECRET: "${NOTIFY_SECRET}"

    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"

    ports:
      - "3001:3000"
